name: Fetch & Deploy

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Fetch data
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: |
          cp config/settings.example.yml config/settings.yml
          sed -i "s/YOUR_TOKEN_HERE/$PH_TOKEN/" config/settings.yml
          python main.py fetch

      - name: Generate static page
        run: |
          python src/gen_static.py data/producthunt.db public/index.html
          touch public/.nojekyll

      - name: Push to gh-pages
        run: |
          cp -r public /tmp/public_deploy
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout --orphan gh-pages_tmp
          git rm -rf . > /dev/null 2>&1
          cp -r /tmp/public_deploy/* .
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git branch -M gh-pages
          git push origin gh-pages --force --quiet
